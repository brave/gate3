on:
  push:
    branches:
      - master
    tags:
      - 'v*'

name: Generalized Deployments
jobs:
  push:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
      with:
        role-to-assume: ${{ secrets.GDBP_AWS_IAM_ROLE_ARN }}
        aws-region: us-west-2

    - name: Deploy to Production
      if: startsWith(github.ref, 'refs/tags/')
      uses: brave-intl/general-docker-build-pipeline-action@87bb1ccaa2a5bd4d9896a0add07c3aa34f2d039c # v1.0.35
      env:
        GITHUB_REF_OVERRIDE: refs/heads/production

    - name: Deploy Branch
      if: github.ref == 'refs/heads/master'
      uses: brave-intl/general-docker-build-pipeline-action@87bb1ccaa2a5bd4d9896a0add07c3aa34f2d039c # v1.0.35
