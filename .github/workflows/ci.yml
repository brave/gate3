name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.14'

    - name: Install Poetry
      uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install project
      run: poetry install --no-interaction --all-extras

    - name: Run linting
      run: poetry run ruff check .

    - name: Run type checking
      run: poetry typecheck

    - name: Run tests
      run: poetry run pytest

  integration:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.14'

    - name: Install Poetry
      uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install project
      run: poetry install --no-interaction --all-extras

    - name: Prepare env file for compose
      run: cp env.test .env

    - name: Start app via docker compose
      run: docker compose up -d --build

    - name: Wait for app to become healthy
      run: |
        for i in $(seq 1 60); do
          if curl -fsS http://localhost:8000/api/ping >/dev/null; then
            echo "App is up after ${i}s"
            exit 0
          fi
          sleep 1
        done
        echo "App failed to become healthy in 60s" >&2
        exit 1

    - name: Run integration tests
      run: poetry run pytest integration/ --no-cov -v

    - name: Dump app logs
      if: always()
      run: docker compose logs app

    - name: Tear down compose stack
      if: always()
      run: docker compose down -v
